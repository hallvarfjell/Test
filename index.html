<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>INTZ v10.1 – SPA</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/phosphor-icons@1.4.2"></script>
</head>

<body>
<header class="topbar">
  <div class="nav">
    <a href="#" data-view="dashboard"><strong>INTZ</strong></a>
    <a href="#" data-view="builder">Øktbygger</a>
    <a href="#" data-view="log">Logg</a>
    <a href="#" data-view="settings">Innstillinger</a>
    <a href="#" data-view="help">Hjelp</a>
  </div>
</header>

<main>
  <section data-view="dashboard"></section>
  <section data-view="builder" class="hidden"></section>
  <section data-view="log" class="hidden"></section>
  <section data-view="results" class="hidden"></section>
  <section data-view="settings" class="hidden"></section>
  <section data-view="help" class="hidden"></section>
</main>

<script type="module">
  const views = document.querySelectorAll("section[data-view]");
  function show(view) {
    views.forEach(v => v.classList.toggle("hidden", v.dataset.view !== view));
    history.pushState({ view }, "", "#"+view);
  }
  document.querySelectorAll("[data-view]").forEach(a =>
    a.addEventListener("click", e => {
      e.preventDefault();
      show(a.dataset.view);
    })
  );
  const initial = location.hash.replace("#","") || "dashboard";
  show(initial);
</script>

<script src="main.js"></script>
<script src="builder.js"></script>
<script src="results.js"></script>
<script type="module" src="supabase-client.js"></script>

</body>
</html>
